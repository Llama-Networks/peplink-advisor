name: Release

# Fires on any tag of the form v0.1.0, v1.2.3, etc. Bump the version in
# adapters/anthropic/.claude-plugin/plugin.json in the same commit that you
# tag, so the produced artifacts carry the right version string.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create/update a GitHub Release for this run"
        required: false
        default: true
        type: boolean
      tag_name:
        description: "Release tag to create/use (defaults to v<plugin.json version>)"
        required: false
        type: string

permissions:
  contents: write  # required to create a GitHub Release and upload assets

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve release metadata
        id: release_meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_PUBLISH_RELEASE: ${{ inputs.publish_release }}
          INPUT_TAG_NAME: ${{ inputs.tag_name }}
        run: |
          version="$(python3 - <<'PY'
          import json
          from pathlib import Path

          manifest = Path("adapters/anthropic/.claude-plugin/plugin.json")
          print(json.loads(manifest.read_text())["version"])
          PY
          )"
          expected_tag="v${version}"

          if [ "$EVENT_NAME" = "push" ]; then
            should_release=true
            tag_name="$REF_NAME"
          else
            should_release="${INPUT_PUBLISH_RELEASE:-true}"
            tag_name="${INPUT_TAG_NAME:-$expected_tag}"
          fi

          if [ "$should_release" = "true" ] && [ "$tag_name" != "$expected_tag" ]; then
            echo "Refusing to publish release ${tag_name}: plugin.json version is ${version}, expected tag ${expected_tag}." >&2
            exit 1
          fi

          {
            echo "version=${version}"
            echo "expected_tag=${expected_tag}"
            echo "tag_name=${tag_name}"
            echo "should_release=${should_release}"
          } >> "$GITHUB_OUTPUT"

      - name: Build Anthropic artifacts
        run: python3 build/build_anthropic.py

      - name: Verify Anthropic artifacts
        run: python3 build/verify_anthropic_artifacts.py

      - name: Build ChatGPT bundle
        run: python3 build/build_chatgpt.py

      - name: Verify ChatGPT bundle
        run: python3 build/verify_chatgpt_bundle.py

      - name: List artifacts
        run: ls -la dist/

      # For tag pushes, or manual dispatches that opt into publishing, cut a
      # GitHub Release and attach the built artifacts.
      - name: Create GitHub Release
        if: steps.release_meta.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/peplink-advisor-anthropic-*.zip
            dist/peplink-advisor-chatgpt-*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true

      # For manual runs that skip publishing, expose the artifacts in the
      # Actions UI instead.
      - name: Upload build artifacts (non-release runs)
        if: steps.release_meta.outputs.should_release != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: peplink-advisor-dist
          path: dist/
