# Frontmatter injected at the top of core/SKILL.md when building the Anthropic
# plugin artifact. `name` must match the skill directory name. `description`
# is the discovery/auto-trigger string Claude reads to decide when to load the
# skill — keep the trigger phrases broad enough to catch the deployment shapes
# you care about.
name: peplink-advisor
description: >-
  Answer questions about Peplink routers, access points, and switches — spec
  lookups, side-by-side comparisons, and use-case-driven device recommendations
  backed by a curated solutions library. Use this skill whenever the user
  mentions Peplink, SpeedFusion, PepVPN, InControl, a specific Peplink model
  (BR1, HD2, HD4, MBX, Balance, Transit, Dome, SDX, EPX, MAX, UBR, B One,
  AP One, AP Pro, SD Switch), or describes a networking deployment where
  Peplink hardware is a plausible fit (bonded cellular, failover, maritime,
  vehicular, IoT, remote branch, first responder, broadcast, retail).
